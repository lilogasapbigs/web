<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Task10</title>
</head>
<body style="font-family:Arial;background:#f0f4ff;color:#1a1a2e;margin:20px 30px">

<h1>Формы</h1>
<h2>Элементы диалога</h2>

<form>
  <fieldset style="border:1px solid #7a8cc4;max-width:400px;padding:15px 20px">
    <legend><a href="#" style="color:#2c3e7a">Элементы INPUT</a></legend>

    <label style="display:block;margin-bottom:8px;font-weight:bold">Текстовое поле
      <input type="text" style="display:block;margin-top:4px">
    </label>

    <label style="display:block;margin-bottom:8px;font-weight:bold">Поле для ввода пароля
      <input type="password" style="display:block;margin-top:4px">
    </label>

    <label style="display:block;font-weight:bold">Флажки</label>
    <input type="checkbox"> <input type="checkbox" checked>
    <br><br>

    <label style="display:block;font-weight:bold">Переключатели</label>
    <input type="radio" name="R"> <input type="radio" name="R"> <input type="radio" name="R" checked>
    <br><br>

    <label style="display:block;font-weight:bold">Поле с именами файлов
      <input type="file" style="display:block;margin-top:4px">
    </label>

    <label style="display:block;font-weight:bold">Кнопка подтверждения ввода</label>
    <input type="submit" value="Подтверждение" style="background:#d0d8f0;border:1px solid #7a8cc4;padding:4px 16px;cursor:pointer">
    <br><br>

    <label style="display:block;font-weight:bold">Кнопка с изображением</label>
    <input type="image" src="pictures for HTML/knopka.gif">
    <br><br>

    <label style="display:block;font-weight:bold">Кнопка очистки формы</label>
    <input type="reset" value="Очистка" style="background:#d0d8f0;border:1px solid #7a8cc4;padding:4px 16px;cursor:pointer">

  </fieldset>

  <br>

  <fieldset style="border:1px solid #7a8cc4;max-width:400px;padding:15px 20px">
    <legend><a href="#" style="color:#2c3e7a">Элемент SELECT</a></legend>
    <select style="margin-top:8px">
      <option>Первый</option>
      <option>Второй</option>
      <option>Третий</option>
    </select>
  </fieldset>

  <br>

  <fieldset style="border:1px solid #7a8cc4;max-width:400px;padding:15px 20px">
    <legend><a href="#" style="color:#2c3e7a">Элемент TEXTAREA</a></legend>
    <textarea style="margin-top:8px;width:250px;height:80px;font-family:Arial">Область для ввода текста</textarea>
  </fieldset>

</form>

</body>
</html>
